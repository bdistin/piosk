<!doctype html>
<html lang="en" data-bs-theme="dark">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

		<title>PiOSK</title>
	</head>
	<body>
		<nav id="navs" class="bg-body-tertiary navbar">
			<div class="d-flex justify-content-between container-md">
				<h1 class="my-1">Pi<span class="bg-danger mx-1 px-1 rounded">OSK</span></h1>
				<h1 class="my-1">Hostname:&nbsp;<span id="hostname">unknown</span></h1>
			</div>
		</nav>

		<!--<div id="screen" class="my-5 container-md">
			<img src="/desktop" />
		</div>-->

		<div id="settings" class="my-5 container-md">
			<div class="input-group">
				<span class="input-group-text">URL</span>
				<input id="url" type="text" class="form-control form-control-lg" placeholder="Set URL of Kiosk...">
			</div>
			<div class="input-group">
				<span class="input-group-text">Idle Refresh Timeout</span>
				<input type="number" id="page_timeout" class="form-control form-control-lg">
				<span class="input-group-text">Seconds</span>
			</div>
			<div class="input-group">
				<button id="execute" type="button" class="btn btn-danger">APPLY <span class="align-text-bottom">⏻</span></button>
			</div>
		</div>

		<div id="update-controls" class="my-5 container-md">
			<div class="input-group">
				<button id="update" type="button" class="btn btn-info">Update PiOSK&nbsp;<span class="align-text-bottom">⏻</span></button>
			</div>
		</div>

		<div id="qrcode" hidden></div>

		<template id="template-err">
			<pre class="m-4 alert alert-danger" role="alert"></pre>
		</template>

		<template id="template-suc">
			<pre class="m-4 alert alert-success" role="alert"></pre>
		</template>

		<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
		<script src="script.js"></script>
	</body>
</html>
